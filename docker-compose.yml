version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    environment:
      - PORT=3000
      - NODE_ENV=production
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=password
      - DB_NAME=whatsapp_db
    ports:
      # Map container port 3000 to localhost port 3005 on the host machine
      # to avoid conflict with any other app using port 3000.
      - "127.0.0.1:3005:3000"
    volumes:
      - ./wa_sessions:/app/wa_sessions
      - ./uploads:/app/uploads
    depends_on:
      - db
    networks:
      - whatsapp_net

  db:
    image: mysql:8.0
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=password
      - MYSQL_DATABASE=whatsapp_db
    volumes:
      - mysql_data:/var/lib/mysql
      # Auto-initialize database tables using our schema file on first boot
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    # Do NOT bind port 3306 to host, since CyberPanel's host MySQL already runs there!
    networks:
      - whatsapp_net

networks:
  whatsapp_net:
    driver: bridge

volumes:
  mysql_data:
